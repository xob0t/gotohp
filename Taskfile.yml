version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "gotohp"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  production:
    summary: Builds and packages the application for production
    cmds:
      - task: "{{OS}}:production"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  fmt:
    summary: Formats Go code with gofumpt (stricter than gofmt)
    cmds:
      - gofumpt -l -w .

  lint:
    summary: Runs all linters (Go and frontend)
    cmds:
      - gofumpt -l -d .
      - golangci-lint run --disable=staticcheck,gosimple,stylecheck ./...
      - cmd: npm run lint
        dir: frontend

